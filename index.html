<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local LLaMA Demo</title>
    <style>
        body { font-family: system-ui; max-width: 700px; margin: 40px auto; padding: 0 20px; }
        textarea { width: 100%; height: 100px; margin: 10px 0; }
        button { padding: 8px 20px; cursor: pointer; }
        #response { white-space: pre-wrap; background: #f4f4f4; padding: 15px; margin-top: 15px; border-radius: 6px; }
    </style>
</head>
<body>
    <h1>🦙 Local LLaMA Demo</h1>
    <textarea id="prompt" placeholder="Введіть запит..."></textarea>
    <button onclick="send()">Надіслати</button>
    <div id="response"></div>
    <script>
        async function send() {
            const prompt = document.getElementById('prompt').value;
            const res = document.getElementById('response');
            res.textContent = 'Генерація...';
            try {
                const r = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({model: 'llama3', prompt, stream: false})
                });
                const data = await r.json();
                res.textContent = data.response || JSON.stringify(data);
            } catch (e) {
                res.textContent = 'Помилка: ' + e.message;
            }
        }
    </script>
</body>
</html>
